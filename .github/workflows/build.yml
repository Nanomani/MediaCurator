name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Opt into Node.js 24 for all actions (required before June 16 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    name: Windows (MSVC x64)

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt
      id: install_qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.3'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        cache: true

    - name: Set up MSVC (x64)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Configure CMake
      run: cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DQt6_DIR="${{ steps.install_qt.outputs.Qt6_DIR }}"

    - name: Build
      run: cmake --build build --parallel

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MediaCurator-Windows-Release
        path: build/bin/
        if-no-files-found: error
