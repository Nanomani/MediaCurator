name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Opt into Node.js 24 for all actions (required before June 16 2026 when 20 is dropped).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    name: Windows (MSVC x64)

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.3'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        cache: true

    - name: Configure CMake
      # No -G flag — CMake auto-selects the highest VS version installed.
      # Works on both the current windows-2022 (VS17) and the incoming
      # windows-2025-vs2026 (VS18) runner without any change needed here.
      run: cmake -B build -A x64

    - name: Build
      run: cmake --build build --config Release --parallel

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MediaCurator-Windows-Release
        path: build/bin/Release/
        if-no-files-found: error
